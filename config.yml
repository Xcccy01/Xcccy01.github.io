baseURL: "https://xcccy01.github.io/"
title: Xcccy
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
  tag: tags

menu:
  main:
    - name: Books
      url: books/
      weight: 5
    - name: Papers
      url: papers/
      weight: 2
    - name: Courses
      url: courses/
      weight: 3
    - name: Data
      url: data/
      weight: 4
    - name: GitHub
      url: https://github.com/Xcccy01
      weight: 6

params:
  description: "这里先放首页中文占位，后续展示研究、项目、写作与联系信息。"
  author: Xcccy
  # googleAnalyticsID: "G-XXXXX"
  DateFormat: "January 2006"
  defaultTheme: light
  hideFooter: false
  disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: false
  disableSpecial1stPost: true
  disableAnchoredHeadings: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  MainSections: ["books", "courses", "papers", "data"]
  ShowToc: false
  disableScrollToTop: true
  TocOpen: true
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: false
  profileMode:
    enabled: true
    title: Xcccy
    subtitle: "四川成都本科生。研究方向是 AI、LLM 和 Web 全栈，目前有一个 GitHub 开源作品，也喜欢喝拿铁。这里先用中文句子占位，后续再逐步替换成正式首页介绍。"
    imageUrl: "picture.jpeg"
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: Papers
        url: papers/
      - name: Data
        url: data/
      - name: Books
        url: books/
      - name: Courses
        url: courses/
      - name: Tags
        url: tags/
      - name: Archive
        url: archive/
      - name: GitHub
        url: https://github.com/Xcccy01

  socialIcons:
    - name: Email
      url: mailto:hello@xcccy.site
    - name: Location
      url: location/
    - name: Office Hours
      url: officehours/
    - name: GitHub
      url: https://github.com/Xcccy01

  assets:
    disableScrollBarStyle: true
  cover:
    hiddenInList: false
    hiddenInSingle: true
  label:
    text: "Xcccy"
    icon: favicon.ico
    iconHeight: 18

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: autumn
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
