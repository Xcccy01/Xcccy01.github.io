baseURL: "https://xcccy.site/"
title: Xcccy
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags

menu:
  main:
    - name: Books
      url: books/
      weight: 5
    - name: Papers
      url: papers/
      weight: 2
    - name: Courses
      url: courses/
      weight: 3
    - name: Data
      url: data/
      weight: 4
    - name: Search
      url: search/
      weight: 6
    - name: GitHub
      url: https://github.com/Xcccy01
      weight: 7

params:
  description: "Xcccy 的个人网站 — AI、LLM 与 Web 全栈方向的研究、项目与学习记录。"
  author: Xcccy
  # googleAnalyticsID: "G-XXXXX"
  DateFormat: "January 2006"
  defaultTheme: auto
  hideFooter: false
  disableThemeToggle: false
  ShowShareButtons: false
  ShowReadingTime: false
  disableSpecial1stPost: true
  disableAnchoredHeadings: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: false
  MainSections: ["books", "courses", "papers", "data"]
  ShowToc: false
  disableScrollToTop: false
  keywords: ["Xcccy", "AI", "LLM", "Web 全栈", "个人网站", "研究", "开源"]
  TocOpen: true
  ShowWordCount: false
  UseHugoToc: true
  comments: false
  math: false
  profileMode:
    enabled: true
    title: Xcccy.site
    subtitle: ""
    imageUrl: "picture.jpeg"
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: Papers
        url: papers/
      - name: Data
        url: data/
      - name: Books
        url: books/
      - name: Courses
        url: courses/
      - name: Tags
        url: tags/
      - name: Archive
        url: archive/
      - name: GitHub
        url: https://github.com/Xcccy01

  socialIcons:
    - name: Email
      url: mailto:hello@xcccy.site
    - name: Location
      url: location/
    - name: Office Hours
      url: officehours/
    - name: GitHub
      url: https://github.com/Xcccy01

  assets:
    disableScrollBarStyle: true
  cover:
    hiddenInList: false
    hiddenInSingle: true
  label:
    text: "Xcccy"
    icon: favicon.ico
    iconHeight: 18

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: autumn
  tableOfContents:
    endLevel: 2
    ordered: false
    startLevel: 2
